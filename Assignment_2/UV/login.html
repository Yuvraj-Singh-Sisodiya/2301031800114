<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Career Guidance</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <header>
    <div class="logo-box">
      <h1>CAREER<br><span>GUIDANCE</span></h1>
      <div class="cd">C<sup>D</sup></div>
    </div>
    <nav class="nav-links">
      <a href="#">Ai-Tools</a>
      <a href="#">Editor</a>
      <a href="#">Pricing</a>
      <a href="#">Help</a>
    </nav>
  </header>

  <main class="login-container">
    <h2>Welcome! Ready for the personal<br>guide to success and growth in your career.</h2>

    <button class="google-btn">
      <img src="assets/google-logo.png" alt="Google logo">
      Sign up! with Google
    </button>

    <div class="divider"><span>or</span></div>

    <form action="#">
      <input type="email" placeholder="Email-Address" required />
      <input type="password" placeholder="Password" required />

      <p class="small-text"><a href="reset.html">forget password?</a></p>
      <p class="small-text">don’t have an account? <a href="#">Sign up!</a></p>

      <button type="submit" class="primary-btn">Log In</button>
    </form>
  </main>
</body>
</html>
